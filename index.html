<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casting Bible</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="app">
  <header class="hdr">
    <div>
      <div class="hdr-brand">CASTING BIBLE</div>
      <div class="hdr-sub">OUTDOOR · PRODUCTION · TALENT DIRECTORY</div>
    </div>
    <span class="count-pill" id="total-count"></span>
  </header>

  <nav class="tabs">
    <button class="tab active tf" onclick="switchTab('f')">FEMMES <span id="cnt-f"></span></button>
    <button class="tab th" onclick="switchTab('h')">HOMMES <span id="cnt-h"></span></button>
    <button class="tab tc" onclick="switchTab('c')">CLUBS <span id="cnt-c"></span></button>
    <button class="tab" onclick="switchTab('m')">MARQUES · AGENCES</button>
    <button class="tab ts" onclick="switchTab('s')">⚙ PARAMÈTRES</button>
  </nav>

  <main>
    <div id="panel-f"></div>
    <div id="panel-h" style="display:none"></div>
    <div id="panel-c" style="display:none"></div>
    <div id="panel-m" style="display:none"></div>
    <div id="panel-s" style="display:none"></div>
  </main>
</div>

<!-- FORM MODAL -->
<div class="modal-bg" id="form-modal" style="display:none" onclick="if(event.target===this)closeForm()">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="form-title"></span>
      <button class="modal-close" onclick="closeForm()">✕</button>
    </div>
    <div class="modal-body" id="form-body"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeForm()">ANNULER</button>
      <button class="btn-save f" id="btn-save" onclick="submitForm()">SAUVEGARDER</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="detail-modal" style="display:none" onclick="if(event.target===this)closeDetail()">
  <div class="modal wide">
    <div class="modal-hdr">
      <span class="modal-title" id="detail-title" style="color:var(--text)"></span>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div id="detail-body"></div>
    <div class="modal-footer" style="justify-content:flex-start">
      <button class="btn-del2" onclick="delFromDetail()">✕ SUPPRIMER</button>
      <div style="flex:1"></div>
      <button class="btn-cancel" onclick="closeDetail()">FERMER</button>
      <button class="btn-edit2" onclick="editFromDetail()">ÉDITER</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="geo.js"></script>
<script src="app.js"></script>
</body>
</html>
